<!DOCTYPE html>
<html>
<body>

<h2>While Loop</h2>

<script>
let i = 1;

while(i <= 10){
    document.write(i + "<br>");
    i++;
}

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 1;

do{
    document.write(j + "<br>");
    j++;
}while(j <= 10);

</script>

</body>
</html>
