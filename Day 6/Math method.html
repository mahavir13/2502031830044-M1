<!DOCTYPE html>
<html>
<head>
    <title>Math method</title>

    <script>
    document.writeln(Math.E);      // Euler's number(approx.2.718)

    var a = Math.pow(2,3);
    document.writeln(a);           // 8

    var num = Math.random();
    document.writeln(num);         // 0.8124078072293648

    var num2 = parseInt(1 + (Math.random() * 100));

    document.writeln(num2);        // Random Number between 1 to 100

    document.write(Math.ceil(2.7));    // 3
    document.write(Math.floor(2.7));   // 2
    document.write(Math.round(2.7));   // 3
</script>
</head>

<body>

</body>
</html>
