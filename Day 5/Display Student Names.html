<!DOCTYPE html>
<html>
<body>

<script>

let students = ["Ali","Sara","John"];

document.write("<h2>While Loop</h2>");

let i = 0;

while(i < students.length){
    document.write(students[i] + "<br>");
    i++;
}

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 0;

do{
    document.write(students[j] + "<br>");
    j++;
}while(j < students.length);

</script>

</body>
</html>
