<!DOCTYPE html>
<html>
<body>

<script>

let num = 5;

document.write("<h2>While Loop</h2>");

let i = 1;

while(i <= 10){
    document.write(num + " x " + i + " = " + (num*i) + "<br>");
    i++;
}

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 1;

do{
    document.write(num + " x " + j + " = " + (num*j) + "<br>");
    j++;
}while(j <= 10);

</script>

</body>
</html>
