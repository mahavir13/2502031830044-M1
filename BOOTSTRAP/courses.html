<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.table-container{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.page-title{
    font-weight:700;
}
</style>

</head>
<body>

<div class="container py-4">

    <h2 class="page-title mb-4">
        📚 Course Management
    </h2>

    <!-- Add Course -->
    <div class="card p-4 mb-4">

        <h5 class="mb-3">Add New Course</h5>

        <div class="row">

            <div class="col-md-4 mb-3">
                <input
                    type="text"
                    id="courseName"
                    class="form-control"
                    placeholder="Course Name">
            </div>

            <div class="col-md-4 mb-3">
                <input
                    type="text"
                    id="courseDuration"
                    class="form-control"
                    placeholder="Duration">
            </div>

            <div class="col-md-4 mb-3">
                <input
                    type="number"
                    id="courseFees"
                    class="form-control"
                    placeholder="Fees">
            </div>

        </div>

        <button
            class="btn btn-primary"
            onclick="addCourse()">
            Add Course
        </button>

    </div>

    <!-- Search -->

    <div class="card p-3 mb-4">

        <input
            type="text"
            id="search"
            class="form-control"
            placeholder="Search Course..."
            onkeyup="searchCourse()">

    </div>

    <!-- Table -->

    <div class="table-container">

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>
                    <th>#</th>
                    <th>Course Name</th>
                    <th>Duration</th>
                    <th>Fees</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="courseTable">

            </tbody>

        </table>

    </div>

</div>

<script>

let courses =
JSON.parse(localStorage.getItem("courses")) || [];

function saveCourses(){

    localStorage.setItem(
        "courses",
        JSON.stringify(courses)
    );
}

function renderCourses(){

    let table =
    document.getElementById("courseTable");

    table.innerHTML = "";

    courses.forEach((course,index)=>{

        table.innerHTML += `
        <tr>

            <td>${index + 1}</td>

            <td>${course.name}</td>

            <td>${course.duration}</td>

            <td>₹ ${course.fees}</td>

            <td>

                <button
                class="btn btn-warning btn-sm"
                onclick="editCourse(${index})">
                Edit
                </button>

                <button
                class="btn btn-danger btn-sm"
                onclick="deleteCourse(${index})">
                Delete
                </button>

            </td>

        </tr>
        `;
    });
}

function addCourse(){

    let name =
    document.getElementById("courseName").value;

    let duration =
    document.getElementById("courseDuration").value;

    let fees =
    document.getElementById("courseFees").value;

    if(
        !name ||
        !duration ||
        !fees
    ){
        alert("Please fill all fields");
        return;
    }

    courses.push({
        name,
        duration,
        fees
    });

    saveCourses();

    renderCourses();

    document.getElementById("courseName").value="";
    document.getElementById("courseDuration").value="";
    document.getElementById("courseFees").value="";
}   
function deleteCourse(index){

    if(confirm("Delete Course?")){

        courses.splice(index,1);

        saveCourses();

        renderCourses();
    }
}

function editCourse(index){

    let course = courses[index];

    let name = prompt(
        "Edit Course Name",
        course.name
    );

    let duration = prompt(
        "Edit Duration",
        course.duration
    );

    let fees = prompt(
        "Edit Fees",
        course.fees
    );

    if(
        name !== null &&
        duration !== null &&
        fees !== null
    ){

        course.name = name;
        course.duration = duration;
        course.fees = fees;

        saveCourses();
        renderCourses();
    }
}

function searchCourse(){

    let value =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll(
        "#courseTable tr"
    );

    rows.forEach(row=>{

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";

    });

}
localStorage.setItem(
    "courses",
    JSON.stringify(courses)
);

renderCourses();
</script>

</body>
</html>
