<!DOCTYPE html>
<html>
<head>
    <title>Largest of Three Numbers</title>
</head>
<body>

<h2>Find Largest of Three Numbers</h2>

<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">
<input type="number" id="num3" placeholder="Enter third number">

<button onclick="findLargest()">Check</button>

<p id="result"></p>

<script>

function findLargest() {

    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);

    if (a > b && a > c) {
        document.getElementById("result").innerHTML = a + " is Largest";
    }
    else if (b > a && b > c) {
        document.getElementById("result").innerHTML = b + " is Largest";
    }
    else {
        document.getElementById("result").innerHTML = c + " is Largest";
    }

}

</script>

</body>
</html>
