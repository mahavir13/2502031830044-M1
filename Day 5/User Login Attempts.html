<!DOCTYPE html>
<html>
<body>

<script>

document.write("<h2>While Loop</h2>");

let i = 1;

while(i <= 3){
    document.write("Login Attempt " + i + "<br>");
    i++;
}

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 1;

do{
    document.write("Login Attempt " + j + "<br>");
    j++;
}while(j <= 3);

</script>

</body>
</html>
