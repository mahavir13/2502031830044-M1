<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.table-container{
    background:white;
    padding:20px;
    border-radius:15px;
}

.page-title{
    font-weight:700;
}
</style>

</head>
<body>

<div class="container py-4">

    <h2 class="page-title mb-4">
        🎓 Student Management
    </h2>

    <!-- Add Student Form -->
    <div class="card p-4 mb-4">

        <h5 class="mb-3">Add Student</h5>

        <div class="row">

            <div class="col-md-3 mb-3">
                <input
                    type="text"
                    id="studentId"
                    class="form-control"
                    placeholder="Student ID">
            </div>

            <div class="col-md-3 mb-3">
                <input
                    type="text"
                    id="studentName"
                    class="form-control"
                    placeholder="Student Name">
            </div>

            <div class="col-md-3 mb-3">
                <input
                    type="email"
                    id="studentEmail"
                    class="form-control"
                    placeholder="Email">
            </div>

            <div class="col-md-3 mb-3">
                <input
                    type="text"
                    id="studentCourse"
                    class="form-control"
                    placeholder="Course">
            </div>

        </div>

        <button
            class="btn btn-primary"
            onclick="addStudent()">
            Add Student
        </button>

    </div>

    <!-- Search -->
    <div class="card p-3 mb-4">

        <input
            type="text"
            id="search"
            class="form-control"
            placeholder="Search Student..."
            onkeyup="searchStudent()">

    </div>

    <!-- Table -->
    <div class="table-container">

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

</div>

<script>

let students =
JSON.parse(localStorage.getItem("students")) || [];

function saveStudents(){
    localStorage.setItem(
        "students",
        JSON.stringify(students)
    );
}

function renderStudents(){

    let table =
    document.getElementById("studentTable");

    table.innerHTML = "";

    students.forEach((student,index)=>{

        table.innerHTML += `
        <tr>

            <td>${student.id}</td>

            <td>${student.name}</td>

            <td>${student.email}</td>

            <td>${student.course}</td>

            <td>

                <button
                class="btn btn-warning btn-sm"
                onclick="editStudent(${index})">
                Edit
                </button>

                <button
                class="btn btn-danger btn-sm"
                onclick="deleteStudent(${index})">
                Delete
                </button>

            </td>

        </tr>
        `;
    });
}

function addStudent(){

    let id =
    document.getElementById("studentId").value;

    let name =
    document.getElementById("studentName").value;

    let email =
    document.getElementById("studentEmail").value;

    let course =
    document.getElementById("studentCourse").value;

    if(
        !id ||
        !name ||
        !email ||
        !course
    ){
        alert("Fill all fields");
        return;
    }

    students.push({
        id,
        name,
        email,
        course
    });

    saveStudents();
    renderStudents();

    document.getElementById("studentId").value="";
    document.getElementById("studentName").value="";
    document.getElementById("studentEmail").value="";
    document.getElementById("studentCourse").value="";
}

function deleteStudent(index){

    if(confirm("Delete Student?")){

        students.splice(index,1);

        saveStudents();

        renderStudents();
    }
}

function editStudent(index){

    let student =
    students[index];

    let name =
    prompt(
        "Edit Name",
        student.name
    );
    let email =
    prompt(
        "Edit Email",
        student.email
    );
    let course =
    prompt(
        "Edit Course",
        student.course
    );

    if(name!==null){

        student.name = name;
        student.email = email;
        student.course = course;


        saveStudents();

        renderStudents();
    }
}

function searchStudent(){

    let value =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll(
        "#studentTable tr"
    );

    rows.forEach(row=>{

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";

    });
}
localStorage.setItem(
    "students",
    JSON.stringify(students)
);

renderStudents();

</script>

</body>
</html>
