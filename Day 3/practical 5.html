<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative CSS Transform Animation</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
}

/* Container */
.container{
    display:flex;
    gap:50px;
}

/* Circle Objects */
.circle{
    width:120px;
    height:120px;
    border-radius:50%;
    position:relative;
    cursor:pointer;
}

/* Different Colors */
.c1{
    background:cyan;
    box-shadow:0 0 25px cyan;
}

.c2{
    background:lime;
    box-shadow:0 0 25px lime;
}

.c3{
    background:hotpink;
    box-shadow:0 0 25px hotpink;
}

/* Hover Effects */

/* Orbit Animation */
.c1:hover{
    animation:orbit 2s infinite alternate;
}

/* Flip Animation */
.c2:hover{
    animation:flip 2s infinite;
}

/* Pulse Animation */
.c3:hover{
    animation:pulse 1.5s infinite;
}

/* Orbit */
@keyframes orbit{

    0%{
        transform:translate(0,0) rotate(0deg);
        background:cyan;
    }

    25%{
        transform:translate(60px,-40px) rotate(90deg);
        background:blue;
    }

    50%{
        transform:translate(0,-80px) rotate(180deg);
        background:purple;
    }

    75%{
        transform:translate(-60px,-40px) rotate(270deg);
        background:red;
    }

    100%{
        transform:translate(0,0) rotate(360deg);
        background:cyan;
    }
}

/* Flip */
@keyframes flip{

    0%{
        transform:perspective(400px) rotateY(0deg);
        background:lime;
    }

    50%{
        transform:perspective(400px) rotateY(180deg) scale(1.3);
        background:yellow;
    }

    100%{
        transform:perspective(400px) rotateY(360deg);
        background:lime;
    }
}

/* Pulse */
@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:1;
        background:hotpink;
    }

    50%{
        transform:scale(1.8);
        opacity:0.5;
        background:orange;
    }

    100%{
        transform:scale(1);
        opacity:1;
        background:hotpink;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

</div>

</body>
</html>
