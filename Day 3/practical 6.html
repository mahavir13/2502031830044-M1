<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:90%;
    margin:20px auto;

    display:grid;

    grid-template-columns: 3fr 1fr;
    grid-template-rows: 70px 350px 80px;

    gap:5px;
}

/* Header */
.header{
    grid-column:1 / 3;
    background:gray;
    color:white;
    text-align:center;
    line-height:70px;
    font-size:24px;
}

/* Main Content */
.content{
    background:lightgray;
    text-align:center;
    padding-top:150px;
    font-size:22px;
}

/* Right Side Boxes */
.sidebar{
    display:grid;
    grid-template-rows:1fr 1fr 1fr;
    gap:5px;
}

.box{
    background:gray;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* Footer */
.footer{
    grid-column:1 / 3;
    background:gray;
    color:white;
    text-align:center;
    line-height:80px;
    font-size:22px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">Header</div>

    <div class="content">Content</div>

    <div class="sidebar">
        <div class="box">HTML</div>
        <div class="box">CSS</div>
        <div class="box">JS</div>
    </div>

    <div class="footer">Footer</div>

</div>

</body>
</html>
