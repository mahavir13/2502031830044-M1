<!DOCTYPE html>
<html>
<body>

<script>

document.write("<h2>While Loop</h2>");

let i = 10;

while(i >= 1){
    document.write(i + "<br>");
    i--;
}

document.write("Time Up!");

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 10;

do{
    document.write(j + "<br>");
    j--;
}while(j >= 1);

document.write("Time Up!");

</script>

</body>
</html>
