<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Operators</title>
</head>
<body>
<h2>JavaScript Operators Example</h2>
<script>
let a = 10;
let b = 5;

document.write("<h3>Arithmetic Operators</h3>");
document.write("Addition: " + (a + b) + "<br>");
document.write("Subtraction: " + (a - b) + "<br>");
document.write("Multiplication: " + (a * b) + "<br>");
document.write("Division: " + (a / b) + "<br>");
document.write("Modulus: " + (a % b));

let c = 6;
c++;
document.write("<h3>Increment Operator</h3>");
document.write("Increment : " + c);

let d = 8;
d--;
document.write("<h3>Decrement Operator</h3>");
document.write("Decrement-- : " + d + "<br>");

document.write("<h3>Comparison Operators</h3>");
document.write("a > b : " + (a > b) + "<br>");
document.write("a < b : " + (a < b) + "<br>");
document.write("a == b : " + (a == b) + "<br>");
document.write("a != b : " + (a != b) + "<br>");

</script>
</body>
</html>
