<!DOCTYPE html>
<html>
<body>

<script>

document.write("<h2>While Loop</h2>");

let i = 1;

while(i <= 20){
    document.write(i + "<br>");
    i += 2;
}

document.write("<hr>");
document.write("<h2>Do While Loop</h2>");

let j = 1;

do{
    document.write(j + "<br>");
    j += 2;
}while(j <= 20);

</script>

</body>
</html>
